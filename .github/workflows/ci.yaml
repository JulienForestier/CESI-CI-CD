name: CI - Orchestrator

on:
  push:
    branches:
      - dev
      - feature/**
      - release/**
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      front-changed: ${{ steps.filter.outputs.front }}
      api-changed: ${{ steps.filter.outputs.api }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            front:
              - 'application/collector-shop/**'
              - '.github/workflows/ci-front.yml'
              - '.github/workflows/code-quality-sast.yml'
              - '.github/workflows/deploy-front.yml'
            api:
              - 'api/**'
              - '!api/**/bin/**'
              - '!api/**/obj/**'
              - '.github/workflows/ci-api.yml'
              - '.github/workflows/code-quality-sast.yml'
              - '.github/workflows/ci-security.yml'

  front-pipeline:
    if: needs.detect-changes.outputs.front-changed == 'true'
    needs: detect-changes
    uses: ./.github/workflows/ci-front.yml
    secrets: inherit

  api-pipeline:
    if: needs.detect-changes.outputs.api-changed == 'true'
    needs: detect-changes
    uses: ./.github/workflows/ci-api.yml
    secrets: inherit

  security-pipeline:
    needs: detect-changes
    uses: ./.github/workflows/ci-security.yml
    with:
      trufflehog_base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      trufflehog_head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    secrets: inherit

  code-quality-pipeline:
    needs: detect-changes
    uses: ./.github/workflows/code-quality-sonar.yml
    secrets: inherit

  status:
    if: always()
    needs: [front-pipeline, api-pipeline, security-pipeline, code-quality-pipeline]
    uses: ./.github/workflows/ci-status.yml
    with:
      front_result: ${{ needs.front-pipeline.result }}
      api_result: ${{ needs.api-pipeline.result }}
      security_result: ${{ needs.security-pipeline.result }}
      code_quality_result: ${{ needs.code-quality-pipeline.result }}
      should_comment: ${{ github.event_name == 'pull_request' }}
      pull_request_number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
    secrets: inherit