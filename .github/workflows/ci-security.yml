name: CI - Security

on:
  workflow_call:
    inputs:
      trufflehog_base:
        required: false
        type: string
        default: ''
      trufflehog_head:
        required: false
        type: string
        default: ''
      front_changed:
        required: false
        type: string
        default: 'true'
      api_changed:
        required: false
        type: string
        default: 'true'

permissions:
  contents: read
  security-events: write

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Scan
        if: inputs.trufflehog_base != '' && inputs.trufflehog_head != ''
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ inputs.trufflehog_base }}
          head: ${{ inputs.trufflehog_head }}
          extra_args: --only-verified

  semgrep-frontend:
    name: Semgrep - Frontend
    if: inputs.front_changed == 'true'
    uses: ./.github/workflows/code-quality-sast.yml
    with:
      scan_path: application/collector-shop
      config: p/security-audit
      category: semgrep-frontend
    secrets: inherit

  semgrep-api:
    name: Semgrep - API
    if: inputs.api_changed == 'true'
    uses: ./.github/workflows/code-quality-sast.yml
    with:
      scan_path: api/CESI-CI-CD
      config: p/security-audit
      category: semgrep-api
    secrets: inherit

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.repository }}
          path: '.'
          format: 'SARIF'
          out: 'dependency-check-report'
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'dependency-check-report/dependency-check-report.sarif'
          category: 'dependency-check'

  codeql-frontend:
    name: CodeQL (javascript-typescript)
    if: inputs.front_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'application/collector-shop/package-lock.json'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Install frontend dependencies
        working-directory: application/collector-shop
        run: npm ci

      - name: Build frontend
        working-directory: application/collector-shop
        run: npm run build

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-javascript-typescript

  codeql-api:
    name: CodeQL (csharp)
    if: inputs.api_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Restore .NET dependencies
        working-directory: api/CESI-CI-CD
        run: dotnet restore

      - name: Build .NET
        working-directory: api/CESI-CI-CD
        run: dotnet build --no-restore --configuration Release

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-csharp
