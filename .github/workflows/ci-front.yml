name: CI - Frontend

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'application/collector-shop/package-lock.json'

      - name: Install dependencies
        working-directory: application/collector-shop
        run: npm ci

      - name: Run ESLint
        working-directory: application/collector-shop
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'application/collector-shop/package-lock.json'

      - name: Install dependencies
        working-directory: application/collector-shop
        run: npm ci

      - name: Run tests
        working-directory: application/collector-shop
        run: npm test

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./application/collector-shop/coverage/coverage-final.json
          fail_ci_if_error: false

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'application/collector-shop/package-lock.json'

      - name: Install dependencies
        working-directory: application/collector-shop
        run: npm ci

      - name: npm audit
        working-directory: application/collector-shop
        run: npm audit --audit-level=high

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'application/collector-shop/package-lock.json'

      - name: Install dependencies
        working-directory: application/collector-shop
        run: npm ci

      - name: Build application
        working-directory: application/collector-shop
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: front-dist
          path: application/collector-shop/dist/

  container-scan:
    name: Container Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./application/collector-shop
          file: ./application/collector-shop/Dockerfile
          push: false
          load: true
          tags: collector-shop:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.72.0
        with:
          image-ref: collector-shop:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-scan