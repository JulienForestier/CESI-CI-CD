name: Build & Deploy Vite App

on:
  workflow_run:
    workflows:
      - CI - Orchestrator
    types:
      - completed
    branches:
      - dev
      - release/**
      - main

permissions:
  contents: write
  packages: write

concurrency:
  group: deploy-front-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  APP_NAME: collector-shop

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.image_tag }}
      target_env: ${{ steps.target.outputs.target_env }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set lowercase OWNER
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Determine target environment
        id: target
        run: |
          BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"

          if [[ "$BRANCH_NAME" == "dev" ]]; then
            TARGET_ENV="dev"
          elif [[ "$BRANCH_NAME" == release/* ]]; then
            TARGET_ENV="rec"
          elif [[ "$BRANCH_NAME" == "main" ]]; then
            TARGET_ENV="prod"
          else
            echo "::error::Unsupported branch for deployment: $BRANCH_NAME"
            exit 1
          fi

          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"

      - name: Generate image tag
        id: image
        run: |
          BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"

          if [[ "$BRANCH_NAME" == release/* ]]; then
            IMAGE_SUFFIX="${BRANCH_NAME#release/}"
          else
            IMAGE_SUFFIX="$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)"
          fi

          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.APP_NAME }}:${IMAGE_SUFFIX}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./application/collector-shop
          file: ./application/collector-shop/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-kubernetes:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kubernetes repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/CESI-CI-CD-kubernetes
          ref: main
          token: ${{ secrets.GH_PAT }}
          path: CESI-CI-CD-kubernetes

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Update image in overlay
        run: |
          cd CESI-CI-CD-kubernetes/overlays/${{ needs.build-and-push.outputs.target_env }}

          kustomize edit set image "ghcr.io/OWNER/REPO=${{ needs.build-and-push.outputs.image_tag }}"

          git config user.email "action@github.com"
          git config user.name "github-actions"
          git add kustomization.yaml
          git commit -m "Update image to ${{ needs.build-and-push.outputs.image_tag }}" || echo "No changes"
          git push