name: CI - Status

on:
  workflow_call:
    inputs:
      front_result:
        required: false
        type: string
        default: skipped
      api_result:
        required: false
        type: string
        default: skipped
      security_result:
        required: false
        type: string
        default: skipped
      code_quality_result:
        required: false
        type: string
        default: skipped
      should_comment:
        required: false
        type: boolean
        default: false
      pull_request_number:
        required: false
        type: string
        default: ''

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  status-check:
    name: CI Status Summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate CI Summary
        run: |
          format_status() {
            case "$1" in
              success) echo "✅ Passed" ;;
              skipped) echo "⚪ Skipped" ;;
              failure) echo "❌ Failed" ;;
              cancelled) echo "⏹️ Cancelled" ;;
              *) echo "⚠️ $1" ;;
            esac
          }

          FRONT_STATUS="$(format_status "${{ inputs.front_result }}")"
          API_STATUS="$(format_status "${{ inputs.api_result }}")"
          SECURITY_STATUS="$(format_status "${{ inputs.security_result }}")"
          CODE_QUALITY_STATUS="$(format_status "${{ inputs.code_quality_result }}")"

          {
            echo "# ✅ CI Pipeline Summary"
            echo ""
            echo "| Component | Status |"
            echo "|-----------|--------|"
            echo "| Frontend | ${FRONT_STATUS} |"
            echo "| API | ${API_STATUS} |"
            echo "| Security | ${SECURITY_STATUS} |"
            echo "| Code Quality (SonarCloud) | ${CODE_QUALITY_STATUS} |"
            echo ""
            echo "All checks completed."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with results
        if: inputs.should_comment && inputs.pull_request_number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pull_request_number }}
          FRONT_RESULT: ${{ inputs.front_result }}
          API_RESULT: ${{ inputs.api_result }}
          SECURITY_RESULT: ${{ inputs.security_result }}
          CODE_QUALITY_RESULT: ${{ inputs.code_quality_result }}
        with:
          script: |
            function formatStatus(value) {
              switch (value) {
                case 'success':
                  return '✅ Passed';
                case 'skipped':
                  return '⚪ Skipped';
                case 'failure':
                  return '❌ Failed';
                case 'cancelled':
                  return '⏹️ Cancelled';
                default:
                  return `⚠️ ${value}`;
              }
            }

            github.rest.issues.createComment({
              issue_number: Number(process.env.PR_NUMBER),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '✅ CI Pipeline summary',
                '',
                `- Frontend: ${formatStatus(process.env.FRONT_RESULT)}`,
                `- API: ${formatStatus(process.env.API_RESULT)}`,
                `- Security: ${formatStatus(process.env.SECURITY_RESULT)}`,
                `- Code Quality (SonarCloud): ${formatStatus(process.env.CODE_QUALITY_RESULT)}`
              ].join('\n')
            });