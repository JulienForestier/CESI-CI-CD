name: CI - API

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: api
        run: dotnet restore CESI-CI-CD.sln

      - name: Build
        working-directory: api
        run: dotnet build CESI-CI-CD.sln --no-restore --configuration Release

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: api
        run: dotnet restore CESI-CI-CD.sln

      - name: Vulnerability audit
        working-directory: api
        run: dotnet list package --vulnerable --include-transitive