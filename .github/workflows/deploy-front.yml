name: Build & Deploy Vite App

on:
  push:
    branches:
      - dev
    paths:
      - 'application/collector-shop/**'
      - '.github/workflows/deploy-front.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_version: ${{ steps.version.outputs.image_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase OWNER
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Generate random image version
        id: version
        run: |
          RANDOM_ID=$(head -c 6 /dev/urandom | od -An -tx1 | tr -d ' ')
          echo "image_version=$RANDOM_ID" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./application/collector-shop
          file: ./application/collector-shop/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/collector-shop:${{ steps.version.outputs.image_version }}

  update-kubernetes:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase OWNER
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout Kubernetes repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/CESI-CI-CD-kubernetes
          token: ${{ secrets.GH_PAT }}
          path: CESI-CI-CD-kubernetes

      - name: Update image in overlays/dev
        run: |
          cd CESI-CI-CD-kubernetes/overlays/dev

          IMAGE_VERSION="${{ needs.build-and-push.outputs.image_version }}"

          sed -i "s|image: .*|image: ghcr.io/${{ env.OWNER }}/collector-shop:$IMAGE_VERSION|g" deployment.yaml

          git config user.email "action@github.com"
          git config user.name "github-actions"
          git add deployment.yaml
          git commit -m "Update image to $IMAGE_VERSION" || echo "No changes"
          git push