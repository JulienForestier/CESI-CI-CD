name: Build & Deploy Vite App

on:
  push:
    branches:
      - dev
    paths:
      - 'application/collector-shop/**'
      - '.github/workflows/deploy-front.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ toLower(github.repository_owner) }}
  IMAGE_NAME: ${{ env.OWNER }}/collector-shop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}        
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./application/collector-shop
          file: ./application/collector-shop/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  update-kubernetes:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kubernetes repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/CESI-CI-CD-kubernetes
          token: ${{ secrets.GH_PAT }}
          path: CESI-CI-CD-kubernetes

      - name: Update image in overlays/dev
        run: |
          cd CESI-CI-CD-kubernetes/overlays/dev
          
          # Vérifier que le fichier existe
          if [ ! -f deployment.yaml ]; then
            echo "Error: deployment.yaml not found in overlays/dev"
            exit 1
          fi
          
          # Mettre à jour l'image
          sed -i "s|image: .*collector-shop.*|image: ghcr.io/${{ toLower(github.repository_owner) }}/collector-shop:dev|g" deployment.yaml
          
          git config user.email "action@github.com"
          git config user.name "github-actions"
          git add .
          git commit -m "Update collector-shop image to ghcr.io/${{ github.repository_owner }}/collector-shop:dev" || echo "No changes"
          git push