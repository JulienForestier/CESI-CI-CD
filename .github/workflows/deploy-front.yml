name: Build & Deploy Vite App

on:
  workflow_run:
    workflows:
      - CI - Orchestrator
    types:
      - completed
    branches:
      - dev

permissions:
  contents: write
  packages: write

concurrency:
  group: deploy-front-dev
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  APP_NAME: collector-shop

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set lowercase OWNER
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Generate image tag
        id: image
        run: |
          BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"

          if [[ "$BRANCH_NAME" == release/* ]]; then
            IMAGE_SUFFIX="${BRANCH_NAME#release/}"
          elif [[ "$BRANCH_NAME" == release-* ]]; then
            IMAGE_SUFFIX="${BRANCH_NAME#release-}"
          else
            IMAGE_SUFFIX="$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)"
          fi

          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.APP_NAME }}:${IMAGE_SUFFIX}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./application/collector-shop
          file: ./application/collector-shop/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_tag }}

  update-kubernetes:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase OWNER
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout Kubernetes repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/CESI-CI-CD-kubernetes
          token: ${{ secrets.GH_PAT }}
          path: CESI-CI-CD-kubernetes

      - name: Update image in overlays/dev
        run: |
          cd CESI-CI-CD-kubernetes/overlays/dev

          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

          sed -i "s|image: .*|image: $IMAGE_TAG|g" deployment.yaml

          git config user.email "action@github.com"
          git config user.name "github-actions"
          git add deployment.yaml
          git commit -m "Update image to $IMAGE_TAG" || echo "No changes"
          git push