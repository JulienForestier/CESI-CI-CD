name: Build & Deploy Vite App

on:
  push:
    branches:
      - dev
    paths:
      - 'application/collector-shop/**'
      - '.github/workflows/deploy-front.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set lowercase OWNER env var
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}  
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./application/collector-shop
          file: ./application/collector-shop/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/collector-shop:dev
            ${{ env.REGISTRY }}/${{ env.OWNER }}/collector-shop:${{ github.sha }}

  update-kubernetes:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase OWNER env var
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout Kubernetes repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/CESI-CI-CD-kubernetes
          token: ${{ secrets.GH_PAT }}
          path: CESI-CI-CD-kubernetes

      - name: Update image in overlays/dev
        run: |
          set -eux

          cd CESI-CI-CD-kubernetes/overlays/dev

          echo "OWNER value: ${{ env.OWNER }}"
          echo "Running on branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Files in overlays/dev:"
          ls -la

          if [ ! -f deployment.yaml ]; then
            echo "Error: deployment.yaml not found in overlays/dev"
            exit 1
          fi

          echo "----- deployment.yaml (before) -----"
          cat deployment.yaml
          echo "-----------------------------------"

          # Remplacement robuste : remplace l'image avec owner et tag
          sed -E -i.bak \
            "s|(image:\s*['\"]?)ghcr\.io/[^/]*/[^'\" ]+(['\"]?)|\1ghcr.io/${{ env.OWNER }}/collector-shop:dev\2|g" \
            deployment.yaml || true

          echo "----- deployment.yaml (after) -----"
          cat deployment.yaml
          echo "----------------------------------"

          echo "Showing git diff (if any):"
          git --no-pager diff -- deployment.yaml || true

          # Configure git user (IMPORTANT)
          git config user.email "action@github.com"
          git config user.name "github-actions"

          git add deployment.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update collector-shop image to ghcr.io/${{ env.OWNER }}/collector-shop:dev"
            git push
          fi