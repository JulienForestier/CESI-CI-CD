name: Code Quality - SonarCloud

on:
  workflow_call:

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'application/collector-shop/package-lock.json'

      - name: Install frontend dependencies
        working-directory: application/collector-shop
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: application/collector-shop
        run: npm test

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore API dependencies
        working-directory: api
        run: dotnet restore CESI-CI-CD.sln

      - name: Run API tests with coverage
        working-directory: api
        run: >
          dotnet test CESI-CI-CD.ApiService.Tests --configuration Release
          --collect:"XPlat Code Coverage" --settings CESI-CI-CD.ApiService.Tests/coverlet.runsettings

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarCloud Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
